name: t22e_workspace
publish_to: none

environment:
  sdk: ^3.11.6

workspace:
  - packages/protocol
  - packages/ansi
  - packages/unicode
  - packages/parser
  - packages/terminal
  - packages/core
  - packages/renderer
  - packages/capability
  - packages/lifecycle
  - packages/widgets
  - packages/testing
  - app/t22e_cli

dev_dependencies:
  melos: ^7.5.1
  lints: ^6.0.0

melos:
  scripts:
    analyze:
      description: Run static analysis on all packages.
      exec: dart analyze
    test:
      description: Run tests in all workspace packages.
      exec: dart test
