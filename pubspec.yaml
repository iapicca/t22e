name: t22e_workspace
publish_to: none

environment:
  sdk: ^3.11.6

workspace:
  - packages/protocol
  - packages/ansi
  - packages/unicode
  - packages/parser
  - packages/terminal
  - packages/core
  - packages/renderer
  - packages/capability
  - packages/lifecycle
  - packages/widgets
  - packages/testing

dev_dependencies:
  melos: ^7.5.1
  lints: ^6.0.0

melos:
  scripts:
    build:
      description: Run build_runner code generation in all packages.
      exec: dart run build_runner build
    analyze:
      description: Run code generation then static analysis on all packages.
      run: |
        melos build
        melos exec -- dart analyze
    test:
      description: Run code generation then tests in all workspace packages.
      run: |
        melos build
        melos exec -- dart test
